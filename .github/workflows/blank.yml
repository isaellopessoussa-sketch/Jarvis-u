name: Construir APK do Jarvis

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Permite que você clique para rodar manualmente se quiser

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Pegar código do repositório
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Instalar o Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Criar arquivos base se não existirem
      run: |
        if [ ! -f package.json ]; then
          echo '{"name": "jarvis-app","version": "1.0.0","main": "index.html","scripts": {"build": "mkdir -p www && cp index.html www/"},"dependencies": {"@capacitor/core": "^6.0.0","@capacitor/android": "^6.0.0"},"devDependencies": {"@capacitor/cli": "^6.0.0"}}' > package.json
        fi

    - name: Instalar dependências e preparar
      run: |
        npm install
        npm run build

    - name: Inicializar o Capacitor para Android
      run: |
        npx cap init jarvis-app com.seunome.jarvis --web-dir=www
        npx cap add android

    - name: Copiar arquivos para a pasta Android
      run: npx cap sync android

    - name: Compilar o APK de verdade
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Disponibilizar o APK para download
      uses: actions/upload-artifact@v4
      with:
        name: Jarvis-Instalador
        path: android/app/build/outputs/apk/debug/app-debug.apk
