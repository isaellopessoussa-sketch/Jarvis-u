<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS HUD</title>
    <style>
        body { 
            background: #020617; 
            color: #00f3ff; 
            font-family: 'Courier New', Courier, monospace; 
            padding: 20px; 
            margin: 0;
            overflow: hidden;
            display: flex;
            height: 100vh;
            box-sizing: border-box;
        }

        /* Lado Esquerdo: O Reator Arc */
        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-right: 1px dashed rgba(0, 243, 255, 0.3);
        }
        .reactor-container {
            position: relative;
            width: 140px;
            height: 140px;
        }
        .reactor { 
            width: 100%; height: 100%; 
            border: 4px double #00f3ff; 
            border-radius: 50%; 
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.5), inset 0 0 30px rgba(0, 243, 255, 0.5); 
            animation: rotate 12s linear infinite;
        }
        .core {
            position: absolute;
            top: 25%; left: 25%;
            width: 50%; height: 50%;
            background: radial-gradient(circle, #ffffff 0%, #00f3ff 70%, transparent 100%);
            border-radius: 50%;
            box-shadow: 0 0 40px #00f3ff;
            animation: pulse 2s ease-in-out infinite;
        }
        h1 { font-weight: bold; letter-spacing: 5px; margin: 15px 0 5px; font-size: 24px; text-shadow: 0 0 10px #00f3ff; }
        .sub-title { color: #475569; font-size: 10px; letter-spacing: 2px; }

        /* Lado Direito: O Console e os Comandos */
        .right-panel {
            flex: 2;
            display: flex;
            flex-direction: column;
            padding-left: 20px;
            justify-content: space-between;
        }
        #console {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid #1e293b;
            border-left: 4px solid #00f3ff;
            padding: 15px;
            flex-grow: 1;
            text-align: left;
            font-size: 14px;
            overflow-y: auto;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .label { color: #64748b; }
        
        /* Área de Digitação */
        .input-area {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex-grow: 1;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #1e293b;
            color: #00f3ff;
            padding: 12px;
            font-family: inherit;
            border-radius: 4px;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #00f3ff;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }
        button { 
            background: rgba(0, 243, 255, 0.1); 
            border: 1px solid #00f3ff; 
            color: #00f3ff; 
            padding: 0 25px; 
            border-radius: 4px; 
            font-size: 14px; 
            font-weight: bold; 
            cursor: pointer; 
            letter-spacing: 1px;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        button:active { background: rgba(0, 243, 255, 0.3); }

        @keyframes rotate { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(0.95); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } }
    </style>
</head>
<body>

    <div class="left-panel">
        <div class="reactor-container">
            <div class="reactor"></div>
            <div class="core"></div>
        </div>
        <h1>J.A.R.V.I.S.</h1>
        <div class="sub-title">HUD INTERFACE v2.5</div>
    </div>
    
    <div class="right-panel">
        <div id="console">
            <div><span class="label">[SISTEMA]:</span> <span id="status">CONEXÃO ESTÁVEL. AGUARDANDO COMANDO TEXTUAL SENHOR.</span></div>
            <div style="margin-top: 10px;"><span class="label">[JARVIS]:</span> <span id="resposta">Pronto para digitação.</span></div>
        </div>

        <div class="input-area">
            <input type="text" id="campoTexto" placeholder="Digite uma ordem para o Jarvis..." onkeypress="checarEnter(event)">
            <button onclick="enviarComando()">Enviar</button>
        </div>
    </div>

    <script>
        // Lógica de envio e processamento de comandos
        function checarEnter(event) {
            if (event.key === 'Enter') enviarComando();
        }

        function enviarComando() {
            const campo = document.getElementById('campoTexto');
            const comando = campo.value.trim();
            if (!comando) return;

            document.getElementById('status').innerText = "PROCESSANDO DIRETRIZ: \"" + comando.toUpperCase() + "\"";
            campo.value = ""; // Limpa a caixa

            processarTexto(comando);
        }

        function processarTexto(texto) {
            const t = texto.toLowerCase();
            let r = "Comando não reconhecido nos bancos de dados locais, senhor.";
            
            if (t.includes("olá") || t.includes("jarvis") || t.includes("acorda")) {
                r = "Olá senhor. Todos os sistemas centrais estão online e operando em perfeita simetria.";
            } else if (t.includes("horas") || t.includes("tempo")) {
                r = "De acordo com os relógios internos, são exatamente " + new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
            } else if (t.includes("protocolo de festa")) {
                r = "Protocolo de festa iniciado. Desbravando arquivos de áudio e preparando iluminação ambiente.";
            } else if (t.includes("limpar") || t.includes("clear")) {
                r = "Console redefinido.";
                document.getElementById('status').innerText = "AGUARDANDO NOVA DIRETRIZ.";
            }

            document.getElementById('resposta').innerText = r;
            falar(r);
        }

        function falar(textoParaFalar) {
            if ('speechSynthesis' in window) {
                const fala = new SpeechSynthesisUtterance(textoParaFalar);
                fala.lang = 'pt-BR';
                fala.rate = 1.15;
                window.speechSynthesis.speak(fala);
            }
        }
    </script>
</body>
</html>
