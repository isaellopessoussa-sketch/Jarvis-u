<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J.A.R.V.I.S. - CORE OS v8.0</title>
    <style>
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        
        body { 
            background: #01060c; color: #00f3ff; font-family: 'Courier New', Courier, monospace; 
            margin: 0; padding: 10px; overflow: hidden; display: flex;
            flex-direction: column; height: 100vh; width: 100vw;
            position: relative; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Scanlines Cinemáticas Dinâmicas */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 243, 255, 0.03) 50%);
            background-size: 100% 4px; z-index: 20; pointer-events: none;
        }
        body::after {
            content: ""; position: absolute; width: 100%; height: 3px; background: rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 12px #00f3ff; animation: scan 6s linear infinite; z-index: 21; pointer-events: none;
        }

        /* PROTOCOLO HACKER ATIVADO (V8 SPECTRUM) */
        body.hacker-mode { background: #000300; color: #00ff00; }
        body.hacker-mode::before { background: linear-gradient(rgba(0, 8, 0, 0) 50%, rgba(0, 255, 0, 0.04) 50%); background-size: 100% 4px; }
        body.hacker-mode::after { background: rgba(0, 255, 0, 0.25); box-shadow: 0 0 12px #00ff00; }
        body.hacker-mode .hud-panel { border-color: rgba(0, 255, 0, 0.2); background: rgba(0, 3, 0, 0.8); }
        body.hacker-mode .ring { border-color: rgba(0, 255, 0, 0.5); box-shadow: 0 0 15px rgba(0, 255, 0, 0.15); }
        body.hacker-mode .center-glow { background: #00ff00; box-shadow: 0 0 25px #00ff00; }
        body.hacker-mode .cmd-btn { border-color: rgba(0, 255, 0, 0.25); color: #22c55e; background: rgba(0, 255, 0, 0.02); }
        body.hacker-mode .cmd-btn:hover { border-color: #00ff00; color: #fff; background: rgba(0, 255, 0, 0.08); }
        body.hacker-mode .bar { background: #00ff00; }
        body.hacker-mode input[type="text"] { border-color: rgba(0, 255, 0, 0.2); }
        body.hacker-mode input[type="text"]:focus { border-color: #00ff00; }

        /* Painel Modular v8 */
        .hud-panel {
            background: rgba(2, 8, 18, 0.7); border: 1px solid rgba(0, 243, 255, 0.15);
            border-radius: 6px; padding: 10px; display: flex; flex-direction: column;
            backdrop-filter: blur(6px); z-index: 10; overflow: hidden;
        }

        /* TOPO: STATUS COMPACTO */
        .header-status { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px dashed rgba(0, 243, 255, 0.15); padding-bottom: 6px; 
            font-size: 11px; color: #475569; letter-spacing: 1px; margin-bottom: 8px;
        }
        .tech-group { display: flex; gap: 12px; }
        .data-node { color: currentColor; font-weight: bold; }

        /* CENTRO LAYOUT DINÂMICO */
        .main-layout {
            display: flex; flex-direction: row; gap: 10px; flex-grow: 1; overflow: hidden;
        }

        /* GAVETA DE COMANDOS RETRÁTIL (ESTILO DIRETRIZES DA ARMADURA) */
        .drawer-panel {
            width: 250px; display: flex; flex-direction: column; gap: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .drawer-panel.collapsed { width: 0px; opacity: 0; pointer-events: none; margin-right: -10px; }

        /* INTERFACE DO REATOR INTERATIVO */
        .reactor-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 8px; cursor: pointer; border-bottom: 1px dashed rgba(0, 243, 255, 0.1);
        }
        .viewport-3d { perspective: 400px; display: flex; justify-content: center; align-items: center; margin-bottom: 4px; }
        .reactor-3d { width: 65px; height: 65px; transform: rotateX(25deg) rotateY(-5deg); transform-style: preserve-3d; position: relative; }
        .ring { position: absolute; width: 100%; height: 100%; border: 2.5px dashed rgba(0, 243, 255, 0.4); border-radius: 50%; box-shadow: 0 0 12px rgba(0, 243, 255, 0.1); animation: rotClockwise 12s linear infinite; }
        .ring-inner { position: absolute; top: 12%; left: 12%; width: 76%; height: 76%; border: 2px double #00f3ff; border-radius: 50%; animation: rotCounterClockwise 6s linear infinite; }
        .center-glow { position: absolute; top: 33%; left: 33%; width: 34%; height: 34%; background: #ffffff; border-radius: 50%; box-shadow: 0 0 20px #00f3ff; animation: pulseGlow 1.8s ease-in-out infinite; }

        /* Grade de Botões sem Cortes de Texto */
        .cmd-column { display: flex; flex-direction: column; gap: 5px; width: 100%; overflow-y: auto; flex-grow: 1; }
        .cmd-btn {
            background: rgba(0, 243, 255, 0.02); border: 1px solid rgba(0, 243, 255, 0.12);
            border-radius: 4px; color: #38bdf8; font-family: inherit; font-size: 10px; font-weight: bold;
            padding: 9px 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px;
            transition: all 0.2s ease; text-align: left; width: 100%;
        }
        .cmd-btn:hover { color: #ffffff; border-color: #00f3ff; background: rgba(0, 243, 255, 0.06); transform: translateX(3px); }

        /* TERMINAL DE CASCA DO CORE CENTRAL */
        .terminal-panel { flex-grow: 1; justify-content: space-between; position: relative; }
        .console-box {
            flex-grow: 1; background: rgba(1, 3, 7, 0.9);
            border-left: 2px solid currentColor; padding: 12px;
            font-size: 13px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 6px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9); margin-bottom: 8px;
        }
        .log-line { animation: fadeLine 0.22s ease-out forwards; line-height: 1.4; }
        .sys-label { color: #475569; font-weight: bold; }
        .user-label { color: #94a3b8; font-weight: bold; }

        /* EQUALIZADOR QUÂNTICO COMPACTO DE ALTURA VARIÁVEL */
        .data-visualizer { display: flex; gap: 2px; height: 18px; align-items: flex-end; margin-bottom: 6px; opacity: 0.6; width: 100%; }
        .bar { flex-grow: 1; background: #00f3ff; height: 15%; transition: height 0.08s ease; }
        
        /* CONTROLES DA BASE SUPER RESPONSIVOS */
        .action-bar { display: flex; gap: 6px; width: 100%; }
        input[type="text"] { 
            flex-grow: 1; background: rgba(1, 3, 7, 0.95); border: 1px solid rgba(0, 243, 255, 0.15); 
            color: inherit; font-family: inherit; font-size: 13px; padding: 10px 12px; border-radius: 4px; outline: none; 
        }
        input[type="text"]:focus { border-color: #00f3ff; }
        
        .ctrl-btn { background: rgba(0, 243, 255, 0.02); border: 1px solid currentColor; color: inherit; font-family: inherit; font-weight: bold; padding: 0 14px; border-radius: 4px; cursor: pointer; font-size: 12px; }

        /* SUPORTE TOTAL PARA CELULAR EM PÉ (MODO RETRATO RE-ENGENHARIA) */
        @media (max-width: 768px) or (orientation: portrait) {
            body { overflow: hidden; }
            .main-layout { flex-direction: column; }
            .drawer-panel { width: 100%; max-height: 140px; }
            .drawer-panel.collapsed { height: 0px; margin-bottom: -10px; }
            .cmd-column { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; overflow-y: auto; }
            .reactor-container { display: none; } /* Oculta reator se estiver em pé para salvar espaço */
            .terminal-panel { height: 60%; }
        }

        @keyframes scan { from { top: -10px; } to { top: 100%; } }
        @keyframes rotClockwise { from { transform: rotateZ(0deg); } to { transform: rotateZ(360deg); } }
        @keyframes rotCounterClockwise { from { transform: rotateZ(360deg); } to { transform: rotateZ(0deg); } }
        @keyframes pulseGlow { 0%, 100% { transform: scale(0.92); opacity: 0.6; } 50% { transform: scale(1.05); opacity: 1; } }
        @keyframes fadeLine { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="hud-panel header-status" style="flex-direction: row; margin-bottom: 8px;">
        <div class="tech-group">
            <span>NÚCLEO: <span class="data-node" style="color: #22c55e;">ESTÁVEL</span></span>
            <span>DIRETRIZ: <span class="data-node" style="color: #38bdf8;">v8.0_ONLINE</span></span>
            <span>MATRIZ: <span class="data-node" id="batNode">100%</span></span>
        </div>
        <span id="timeDisplay">00:00:00</span>
    </div>

    <div class="main-layout">
        
        <div class="hud-panel drawer-panel" id="drawerPanel">
            <div class="reactor-container" onclick="toggleDrawer()" title="Clique para recolher o painel">
                <div class="viewport-3d">
                    <div class="reactor-3d">
                        <div class="ring"></div>
                        <div class="ring-inner"></div>
                        <div class="center-glow"></div>
                    </div>
                </div>
                <span style="font-size: 8px; color: #475569; font-weight: bold; letter-spacing: 1px;">MENU DE OPERAÇÕES</span>
            </div>

            <div class="cmd-column">
                <button class="cmd-btn" onclick="clicouComando('jarvis')">➢ Diagnóstico Base</button>
                <button class="cmd-btn" onclick="clicouComando('status do sistema')">➢ Monitorar Hardware</button>
                <button class="cmd-btn" onclick="clicouComando('abrir câmera')">➢ Inicializar Câmera</button>
                <button class="cmd-btn" onclick="clicouComando('pesquisar armadura do homem de ferro')">➢ Pesquisa Global</button>
                <button class="cmd-btn" onclick="clicouComando('ligar modo hacker')">➢ PROTOCOLO_HACKER</button>
                <button class="cmd-btn" onclick="clicouComando('desativar modo hacker')">➢ PROTOCOLO_STARK</button>
            </div>
        </div>

        <div class="hud-panel terminal-panel">
            <div class="console-box" id="consoleBox">
                <div class="log-line"><span class="sys-label">[SISTEMA]:</span> Protocolo Core v8 inicializado com sucesso. Bem-vindo de volta, senhor.</div>
            </div>

            <div class="data-visualizer" id="visualizer"></div>

            <div class="action-bar">
                <button class="ctrl-btn" onclick="toggleDrawer()" title="Recolher Menu">🎛️</button>
                <button class="ctrl-btn" onclick="escutarVoz()" id="micBtn">🎙️</button>
                <input type="text" id="inputCmd" placeholder="Insira uma diretriz..." onkeypress="verificarEnter(event)">
                <button class="ctrl-btn" onclick="processarEnvio()">Exec</button>
            </div>
        </div>

    </div>

    <script>
        // Montagem das 60 faixas do equalizador quântico v8
        const viz = document.getElementById('visualizer');
        const totalBarras = 60;
        for(let i=0; i<totalBarras; i++) { viz.innerHTML += `<div class="bar" id="b-${i}"></div>`; }

        // Animação constante de telemetria em segundo plano
        setInterval(() => {
            for(let i=0; i<totalBarras; i++) {
                const bar = document.getElementById(`b-${i}`);
                if(bar) {
                    let basica = Math.floor(Math.random() * 40) + 10;
                    bar.style.height = basica + "%";
                }
            }
        }, 130);

        // Aceleração do equalizador sob computação pesada
        function dispararPulsoProcessamento() {
            let ciclos = 0;
            const intervalo = setInterval(() => {
                for(let i=0; i<totalBarras; i++) {
                    const bar = document.getElementById(`b-${i}`);
                    if(bar) bar.style.height = (Math.floor(Math.random() * 85) + 15) + "%";
                }
                if(++ciclos > 8) clearInterval(intervalo);
            }, 50);
        }

        // Alternância da Gaveta (Drawer Open/Close)
        function toggleDrawer() {
            const drawer = document.getElementById('drawerPanel');
            drawer.classList.toggle('collapsed');
        }

        // Relógio Sincronizado
        setInterval(() => { document.getElementById('timeDisplay').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);

        function verificarEnter(e) { if (e.key === 'Enter') processarEnvio(); }
        function clicouComando(txt) { acionarComando(txt); }

        function processarEnvio() {
            const caixa = document.getElementById('inputCmd');
            const cmd = caixa.value.trim();
            if(!cmd) return;
            caixa.value = "";
            dispararPulsoProcessamento();
            printConsole("VOCÊ", cmd.toUpperCase(), "user-label");
            acionarComando(cmd);
        }

        function printConsole(autor, texto, classeLabel) {
            const box = document.getElementById('consoleBox');
            box.innerHTML += `<div class="log-line"><span class="${classeLabel}">[${autor}]:</span> ${texto}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        async function acionarComando(comandoBruto) {
            const t = comandoBruto.toLowerCase().trim();
            let r = "Diretriz de barramento local não localizada nos registros de IA, senhor.";

            if (t.includes("status do sistema") || t.includes("bateria") || t.includes("hardware")) {
                let nivel = 100;
                let carregando = "operando em modo dissipativo";
                try {
                    if (navigator.getBattery) {
                        const battery = await navigator.getBattery();
                        nivel = Math.round(battery.level * 100);
                        carregando = battery.charging ? "conectado à rede externa" : "operando em modo dissipativo";
                        document.getElementById('batNode').innerText = nivel + "%";
                        r = `Energia da armadura em ${nivel} por cento. O reator central está ${carregando}, senhor.`;
                    }
                } catch(e) { r = "Estimativa lógica de segurança indica estabilidade energética do mainframe."; }
                printConsole("JARVIS", r.toUpperCase(), "sys-label"); falar(r); return;
            }

            if (t.includes("câmera") || t.includes("camera")) {
                r = "Inicializando hardware de captura óptica nativo do Android.";
                printConsole("JARVIS", r.toUpperCase(), "sys-label"); falar(r);
                setTimeout(() => { window.location.href = "intent://#Intent;action=android.media.action.IMAGE_CAPTURE;end"; }, 1000); return;
            }

            if (t.startsWith("pesquisar ")) {
                const termo = t.replace("pesquisar ", "");
                r = "Fazendo varredura quântica na rede global para indexar: " + termo;
                printConsole("JARVIS", r.toUpperCase(), "sys-label"); falar(r);
                setTimeout(() => { window.open("https://www.google.com/search?q=" + encodeURIComponent(termo), '_blank'); }, 1000); return;
            }

            if (t.includes("hacker") || t.includes("protocolo_hacker")) {
                r = "Protocolo de infiltração ativo. Criptografando conexões e alterando espectro visual.";
                document.body.classList.add('hacker-mode');
                document.getElementById('hudTitle').innerText = "MAINFRAME";
            } else if (t.includes("stark") || t.includes("normal") || t.includes("desativar")) {
                r = "Chaves mestras verificadas. Restaurando frequência estável azul neon das Indústrias Stark.";
                document.body.classList.remove('hacker-mode');
                document.getElementById('hudTitle').innerText = "J.A.R.V.I.S.";
            } else if (t.includes("olá") || t.includes("jarvis") || t.includes("iniciar")) {
                r = "Todos os sistemas operando em perfeita simetria algorítmica. Pronto para as diretrizes, senhor.";
            } else if (t.includes("horas") || t.includes("tempo")) {
                r = "Cronômetro interno indica exatamente " + new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}) + ".";
            }
            printConsole("JARVIS", r.toUpperCase(), "sys-label"); falar(r);
        }

        function falar(textoParaFalar) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const fala = new SpeechSynthesisUtterance(textoParaFalar);
                fala.lang = 'pt-BR'; fala.rate = 1.15;
                window.speechSynthesis.speak(fala);
            }
        }

        function escutarVoz() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return;
            const rec = new SpeechRecognition(); rec.lang = 'pt-BR';
            document.getElementById('micBtn').innerText = "🛑"; rec.start();
            rec.onresult = (e) => { 
                const voz = e.results[0][0].transcript;
                printConsole("VOCÊ", voz.toUpperCase(), "user-label"); acionarComando(voz); 
                document.getElementById('micBtn').innerText = "🎙️"; 
            };
            rec.onerror = () => { document.getElementById('micBtn').innerText = "🎙️"; };
        }
    </script>
</body>
</html>
