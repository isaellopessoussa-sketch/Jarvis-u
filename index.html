<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS OS</title>
    <style>
        body { 
            background: #020617; 
            color: #00f3ff; 
            font-family: 'Courier New', Courier, monospace; 
            text-align: center; 
            padding: 50px 20px; 
            margin: 0;
            overflow-x: hidden;
        }
        /* Reator Arc Futurista */
        .reactor-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 30px;
        }
        .reactor { 
            width: 100%; 
            height: 100%; 
            border: 4px double #00f3ff; 
            border-radius: 50%; 
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.6), inset 0 0 30px rgba(0, 243, 255, 0.6); 
            animation: rotate 10s linear infinite;
        }
        .core {
            position: absolute;
            top: 25%; left: 25%;
            width: 50%; height: 50%;
            background: radial-gradient(circle, #ffffff 0%, #00f3ff 70%, transparent 100%);
            border-radius: 50%;
            box-shadow: 0 0 40px #00f3ff;
            animation: pulse 2s ease-in-out infinite;
        }
        h1 { font-weight: bold; letter-spacing: 5px; margin: 10px 0; font-size: 28px; text-shadow: 0 0 10px #00f3ff; }
        .sub-title { color: #475569; font-size: 12px; letter-spacing: 2px; margin-bottom: 30px; }
        
        /* Painel de Status */
        #console {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #1e293b;
            border-left: 4px solid #00f3ff;
            padding: 15px;
            max-width: 400px;
            margin: 20px auto;
            text-align: left;
            font-size: 14px;
            min-height: 80px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }
        .label { color: #64748b; }
        
        /* Botão de Comando */
        button { 
            background: linear-gradient(135deg, rgba(0, 243, 255, 0.1) 0%, rgba(0, 138, 255, 0.1) 100%); 
            border: 1px solid #00f3ff; 
            color: #00f3ff; 
            padding: 18px 50px; 
            border-radius: 4px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(0,243,255,0.2); 
            transition: all 0.3s;
            text-transform: uppercase;
        }
        button:active { transform: scale(0.95); background: rgba(0, 243, 255, 0.3); }

        /* Animações */
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(0.9); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; filter: brightness(1.2); } }
    </style>
</head>
<body>

    <div class="reactor-container">
        <div class="reactor"></div>
        <div class="core" id="reactorCore"></div>
    </div>
    
    <h1>J.A.R.V.I.S.</h1>
    <div class="sub-title">INTELLIGENT SYSTEM OS</div>

    <div id="console">
        <div><span class="label">[SISTEMA]:</span> <span id="status">AGUARDANDO DIRETRIZES SENHOR.</span></div>
        <div style="margin-top: 10px;"><span class="label">[JARVIS]:</span> <span id="resposta">Pronto para o trabalho.</span></div>
    </div>

    <button onclick="ouvir()">Ativar Microfone</button>

    <script>
        // 🛑 ATENÇÃO: Cole a sua chave do Google AI Studio entre as aspas abaixo:
        const GEMINI_API_KEY = "AIzaSyDyNqmgFeASGB-YCRa8gLmE2-yA5L5j1tA";

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const core = document.getElementById('reactorCore');
        
        if (!SpeechRecognition) {
            document.getElementById('status').innerText = "ERRO: Hardware de voz incompatível.";
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'pt-BR';

            function ouvir() {
                document.getElementById('status').innerText = "ESCUTANDO COMPORTAMENTO ACÚSTICO...";
                core.style.animation = "pulse 0.3s infinite"; // Reator pulsa rápido ao ouvir
                recognition.start();
            }

            recognition.onresult = async function(event) {
                const comando = event.results[0][0].transcript;
                document.getElementById('status').innerText = "PROCESSANDO: \"" + comando.toUpperCase() + "\"";
                core.style.animation = "pulse 2s ease-in-out infinite";
                
                await pensarComGemini(comando);
            };

            recognition.onerror = function() {
                document.getElementById('status').innerText = "SISTEMA LOG: Falha na captura de áudio.";
                core.style.animation = "pulse 2s ease-in-out infinite";
            };
        }

        async function pensarComGemini(pergunta) {
            document.getElementById('resposta').innerText = "Conectando aos servidores neurais...";
            
            // Se você não colocou a chave ainda, ele usa o modo offline padrão
            if (GEMINI_API_KEY === "SUA_CHAVE_DO_GEMINI_AQUI" || GEMINI_API_KEY === "") {
                processarOffline(pergunta);
                return;
            }

            // Prompt do sistema para forçar ele a agir como o Jarvis do Homem de Ferro
            const promptFinal = `Você é o JARVIS, o assistente virtual do Homem de Ferro. Responda de forma prestativa, formal, inteligente e chame o usuário de 'senhor' ou 'senhora'. Seja direto e não use textos muito longos. Pergunta: ${pergunta}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptFinal }] }]
                    })
                });

                const data = await response.json();
                const textoResolvido = data.candidates[0].content.parts[0].text;
                
                document.getElementById('resposta').innerText = textoResolvido;
                falar(textoResolvido);

            } catch (erro) {
                console.error(erro);
                document.getElementById('resposta').innerText = "Erro na rede. Mudando para diretrizes locais.";
                processarOffline(pergunta);
            }
        }

        // Respostas locais caso esteja sem internet ou sem chave API
        function processarOffline(texto) {
            const t = texto.toLowerCase();
            let r = "Comando não catalogado no banco de dados local, senhor.";
            
            if (t.includes("olá") || t.includes("jarvis")) {
                r = "Olá senhor. Todos os sistemas operacionais estão operando na mais perfeita ordem.";
            } else if (t.includes("horas")) {
                r = "Agora são exatamente " + new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
            } else if (t.includes("protocolo de festa")) {
                r = "Protocolo de festa ativado. Preparando fogos de artifício e trajes de gala.";
            }

            document.getElementById('resposta').innerText = r;
            falar(r);
        }

        function falar(textoParaFalar) {
            const fala = new SpeechSynthesisUtterance(textoParaFalar);
            fala.lang = 'pt-BR';
            fala.rate = 1.15; // Voz levemente acelerada (robótica elegante)
            fala.pitch = 1.0; 
            window.speechSynthesis.speak(fala);
            document.getElementById('status').innerText = "DIRETRIZ CONCLUÍDA.";
        }
    </script>
</body>
</html>
