<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS QUANTUM HUD</title>
    <style>
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body { 
            background: #010a15; color: #00f3ff; font-family: 'Courier New', Courier, monospace; 
            margin: 0; padding: 15px; overflow: hidden; display: grid;
            grid-template-columns: 1.2fr 2fr; gap: 15px; height: 100vh; width: 100vw;
            position: relative; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Scanlines de Cinema */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 243, 255, 0.06) 50%);
            background-size: 100% 4px; z-index: 20; pointer-events: none;
        }
        body::after {
            content: ""; position: absolute; width: 100%; height: 6px; background: rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 15px #00f3ff; animation: scan 4s linear infinite; z-index: 21; pointer-events: none;
        }

        /* MODO HACKER */
        body.hacker-mode { background: #000500; color: #00ff00; }
        body.hacker-mode::before { background: linear-gradient(rgba(0, 10, 0, 0) 50%, rgba(0, 255, 0, 0.08) 50%); background-size: 100% 4px; }
        body.hacker-mode::after { background: rgba(0, 255, 0, 0.3); box-shadow: 0 0 15px #00ff00; }
        body.hacker-mode .ring { border-color: rgba(0, 255, 0, 0.6); box-shadow: 0 0 20px rgba(0, 255, 0, 0.3); }
        body.hacker-mode .ring-inner { border-color: #00ff00; border-style: dotted; }
        body.hacker-mode .center-glow { background: #00ff00; box-shadow: 0 0 30px #00ff00; }
        body.hacker-mode .hud-panel { border-color: rgba(0, 255, 0, 0.2); background: rgba(0, 5, 0, 0.6); }
        body.hacker-mode button { border-color: #00ff00; color: #00ff00; }
        body.hacker-mode .cmd-btn { background: rgba(0, 255, 0, 0.05); border-color: rgba(0,255,0,0.3); color: #22c55e; }
        body.hacker-mode .bar { background: #00ff00; }

        /* TELA DE BOOT ATUALIZADA */
        #bootScreen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #010409; z-index: 100; display: flex; flex-direction: column;
            padding: 30px; font-size: 13px; justify-content: flex-start; overflow: hidden;
            color: #00f3ff;
        }
        .skip-btn {
            position: absolute; bottom: 20px; right: 20px; background: transparent;
            border: 1px solid #475569; color: #475569; padding: 5px 10px; font-family: inherit;
            font-size: 11px; cursor: pointer; border-radius: 4px;
        }

        /* Painel Modular */
        .hud-panel {
            background: rgba(2, 12, 27, 0.5); border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 6px; padding: 12px; display: flex; flex-direction: column;
            backdrop-filter: blur(5px); z-index: 10; overflow: hidden;
        }
        .panel-left { justify-content: space-between; align-items: center; }
        
        /* Reator Arc 3D */
        .viewport-3d { perspective: 600px; width: 100%; height: 120px; display: flex; justify-content: center; align-items: center; }
        .reactor-3d { width: 90px; height: 90px; transform: rotateX(35deg) rotateY(-10deg); transform-style: preserve-3d; position: relative; }
        .ring { position: absolute; width: 100%; height: 100%; border: 4px dashed rgba(0, 243, 255, 0.5); border-radius: 50%; box-shadow: 0 0 20px rgba(0, 243, 255, 0.2); animation: rotClockwise 8s linear infinite; }
        .ring-inner { position: absolute; top: 12%; left: 12%; width: 76%; height: 76%; border: 3px double #00f3ff; border-radius: 50%; animation: rotCounterClockwise 4s linear infinite; }
        .center-glow { position: absolute; top: 33%; left: 33%; width: 34%; height: 34%; background: #ffffff; border-radius: 50%; box-shadow: 0 0 30px #00f3ff, inset 0 0 10px #00f3ff; animation: pulseGlow 2s ease-in-out infinite; }

        /* Grade de Comandos */
        .cmd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; width: 100%; }
        .cmd-btn {
            background: rgba(0, 243, 255, 0.03); border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 4px; color: #38bdf8; font-family: inherit; font-size: 10px; padding: 8px 4px;
            cursor: pointer; text-transform: uppercase; white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis; transition: all 0.2s; text-align: center;
        }
        .cmd-btn:hover { color: #fff; border-color: #00f3ff; }

        /* Painel Direito */
        .panel-right { justify-content: space-between; }
        .header-status { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed rgba(0, 243, 255, 0.2); padding-bottom: 6px; font-size: 11px; color: #64748b; }
        
        /* Terminal */
        .console-box {
            flex-grow: 1; background: rgba(1, 6, 15, 0.8);
            border-left: 3px solid currentColor; padding: 10px;
            font-size: 12px; overflow-y: auto; margin: 8px 0;
            display: flex; flex-direction: column; gap: 6px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.6);
        }
        .log-line { animation: fadeLine 0.2s ease-out forwards; }
        .sys-label { color: #475569; font-weight: bold; }
        .user-label { color: #e2e8f0; font-weight: bold; }

        /* Gráfico */
        .data-visualizer { display: flex; gap: 3px; height: 20px; align-items: flex-end; margin-bottom: 4px; }
        .bar { flex-grow: 1; background: #00f3ff; height: 30%; animation: compute 1.2s ease-in-out infinite alternate; }
        .bar:nth-child(2n) { animation-duration: 0.5s; }
        .bar:nth-child(3n) { animation-duration: 0.8s; }

        .action-bar { display: flex; gap: 8px; }
        input[type="text"] { flex-grow: 1; background: rgba(1, 6, 15, 0.9); border: 1px solid rgba(0, 243, 255, 0.2); color: inherit; font-family: inherit; font-size: 13px; padding: 10px; border-radius: 4px; outline: none; }
        .ctrl-btn { background: rgba(0, 243, 255, 0.05); border: 1px solid currentColor; color: inherit; font-family: inherit; font-weight: bold; padding: 0 14px; border-radius: 4px; cursor: pointer; }

        @keyframes scan { from { top: -10px; } to { top: 100%; } }
        @keyframes rotClockwise { from { transform: rotateZ(0deg); } to { transform: rotateZ(360deg); } }
        @keyframes rotCounterClockwise { from { transform: rotateZ(360deg); } to { transform: rotateZ(0deg); } }
        @keyframes pulseGlow { 0%, 100% { transform: scale(0.9); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
        @keyframes compute { from { height: 10%; } to { height: 100%; } }
        @keyframes fadeLine { from { opacity: 0; transform: translateX(-3px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="bootScreen">
        <div style="color: #64748b; font-weight: bold; margin-bottom: 15px; letter-spacing: 2px;">STARK INDUSTRIES SECURE BOOT v4.5</div>
        <div id="bootLogs" style="line-height: 1.8;"></div>
        <button class="skip-btn" onclick="pularBoot()">FORÇAR OVERRIDE ➢</button>
    </div>

    <div class="hud-panel panel-left">
        <div class="viewport-3d">
            <div class="reactor-3d">
                <div class="ring"></div>
                <div class="ring-inner"></div>
                <div class="center-glow"></div>
            </div>
        </div>
        
        <div style="text-align: center; width: 100%;">
            <h1 style="margin: 0; font-size: 18px; letter-spacing: 4px;" id="hudTitle">J.A.R.V.I.S.</h1>
            <span style="font-size: 9px; color: #475569; letter-spacing: 1px;">DEVELOPER CORE OVERRIDE</span>
        </div>

        <div class="cmd-grid">
            <div class="cmd-btn" onclick="clicouComando('jarvis')">➢ Diagnóstico</div>
            <div class="cmd-btn" onclick="clicouComando('status do sistema')">➢ Bateria Real</div>
            <div class="cmd-btn" onclick="clicouComando('abrir câmera')">➢ Câmera</div>
            <div class="cmd-btn" onclick="clicouComando('pesquisar armadura do homem de ferro')">➢ Pesquisar</div>
            <div class="cmd-btn" onclick="clicouComando('ligar modo hacker')">➢ M. Hacker</div>
            <div class="cmd-btn" onclick="clicouComando('desativar modo hacker')">➢ M. Stark</div>
        </div>
    </div>

    <div class="hud-panel panel-right">
        <div class="header-status">
            <span>PERMISSÃO: DESENVOLVEDOR CREATOR</span>
            <span id="timeDisplay">00:00:00</span>
        </div>

        <div class="console-box" id="consoleBox">
            <div class="log-line"><span class="sys-label">[SISTEMA]:</span> NÚCLEO ONLINE. BEM-VINDO DE VOLTA, SENHOR.</div>
        </div>

        <div class="data-visualizer">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>

        <div class="action-bar">
            <button class="ctrl-btn" onclick="escutarVoz()" id="micBtn">🎙️</button>
            <input type="text" id="inputCmd" placeholder="Digite uma ordem direta..." onkeypress="verificarEnter(event)">
            <button class="ctrl-btn" onclick="processarEnvio()">Exec</button>
        </div>
    </div>

    <script>
        // Sistema de Logs Sem Travamento
        const logs = [
            "Conectando ao núcleo central do Android...",
            "Injetando privilégios nível Stark... [OK]",
            "Alinhando Reator Arc quântico... [ESTÁVEL]",
            "Carregando barramento de telemetria...",
            "Sincronizando relógio atômico local...",
            "ACESSO CONCEDIDO: Bem-vindo, Senhor!"
        ];
        let logIndex = 0;
        
        function rodarBoot() {
            try {
                if(logIndex < logs.length) {
                    const container = document.getElementById('bootLogs');
                    if(container) {
                        container.innerHTML += `<div style="color: #38bdf8">> ${logs[logIndex]}</div>`;
                        logIndex++;
                    }
                    setTimeout(rodarBoot, 350);
                } else {
                    pularBoot();
                }
            } catch(e) {
                pularBoot(); // Se qualquer coisa falhar, abre o app direto!
            }
        }

        function pularBoot() {
            const screen = document.getElementById('bootScreen');
            if(screen) screen.style.display = 'none';
        }

        // Inicia o boot de forma segura
        document.addEventListener("DOMContentLoaded", rodarBoot);

        // Relógio
        setInterval(() => { document.getElementById('timeDisplay').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);

        function verificarEnter(e) { if (e.key === 'Enter') processarEnvio(); }
        function clicouComando(txt) { acionarComando(txt); }

        function processarEnvio() {
            const caixa = document.getElementById('inputCmd');
            const cmd = caixa.value.trim();
            if(!cmd) return;
            caixa.value = "";
            printConsole("VOCÊ", cmd.toUpperCase(), "user-label");
            acionarComando(cmd);
        }

        function printConsole(autor, texto, classeLabel) {
            const box = document.getElementById('consoleBox');
            box.innerHTML += `<div class="log-line"><span class="${classeLabel}">[${autor}]:</span> ${texto}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        async function acionarComando(comandoBruto) {
            const t = comandoBruto.toLowerCase().trim();
            let r = "Diretriz local não indexada nos meus bancos de dados, senhor.";

            // 🔋 Hardware Inteligente Nativo sem dependência externa
            if (t.includes("status do sistema") || t.includes("bateria") || t.includes("hardware")) {
                let nivel = 100;
                let carregando = "operando em modo dissipativo";
                
                try {
                    if (navigator.getBattery) {
                        const battery = await navigator.getBattery();
                        nivel = Math.round(battery.level * 100);
                        carregando = battery.charging ? "alimentado pela fonte externa" : "operando em modo dissipativo";
                        r = `Níveis de energia do dispositivo em ${nivel} por cento. O núcleo central está ${carregando}, senhor.`;
                    } else {
                        r = "Sensores de telemetria física inacessíveis. Barramento térmico operando acima de setenta por cento.";
                    }
                } catch(e) {
                    r = "Matriz quântica estável, mas o barramento de energia reportou uma variação de leitura.";
                }
                
                printConsole("JARVIS", r.toUpperCase(), "sys-label");
                falar(r);
                return;
            }

            if (t.includes("câmera") || t.includes("camera")) {
                r = "Inicializando hardware óptico nativo do Android.";
                printConsole("JARVIS", r.toUpperCase(), "sys-label"); falar(r);
                setTimeout(() => { window.location.href = "intent://#Intent;action=android.media.action.IMAGE_CAPTURE;end"; }, 1000);
                return;
            }

            if (t.startsWith("pesquisar ")) {
                const termo = t.replace("pesquisar ", "");
                r = "Rastreando registros web para: " + termo;
                printConsole("JARVIS", r.toUpperCase(), "sys-label"); falar(r);
                setTimeout(() => { window.open("https://www.google.com/search?q=" + encodeURIComponent(termo), '_blank'); }, 1000);
                return;
            }

            if (t.includes("modo hacker") || t.includes("hacker")) {
                r = "Criptografia ativa. Alterando espectro do terminal de comando.";
                document.body.classList.add('hacker-mode');
                document.getElementById('hudTitle').innerText = "MAINFRAME";
            } else if (t.includes("stark") || t.includes("normal") || t.includes("desativar")) {
                r = "Restaurando frequência azul neon padrão das Indústrias Stark.";
                document.body.classList.remove('hacker-mode');
                document.getElementById('hudTitle').innerText = "J.A.R.V.I.S.";
            } else if (t.includes("olá") || t.includes("jarvis") || t.includes("iniciar")) {
                r = "Todos os sistemas operando com total eficiência energética. À sua disposição.";
            } else if (t.includes("horas") || t.includes("tempo")) {
                r = "São exatamente " + new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}) + ".";
            }

            printConsole("JARVIS", r.toUpperCase(), "sys-label");
            falar(r);
        }

        function falar(textoParaFalar) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const fala = new SpeechSynthesisUtterance(textoParaFalar);
                fala.lang = 'pt-BR'; fala.rate = 1.15;
                window.speechSynthesis.speak(fala);
            }
        }

        function escutarVoz() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return;
            const rec = new SpeechRecognition();
            rec.lang = 'pt-BR';
            document.getElementById('micBtn').innerText = "🛑";
            rec.start();
            rec.onresult = (e) => { 
                const voz = e.results[0][0].transcript;
                printConsole("VOCÊ", voz.toUpperCase(), "user-label");
                acionarComando(voz); 
                document.getElementById('micBtn').innerText = "🎙️"; 
            };
            rec.onerror = () => { document.getElementById('micBtn').innerText = "🎙️"; };
        }
    </script>
</body>
</html>
