<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS QUANTUM HUD</title>
    <style>
        /* Reset de Tela de Cinema */
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body { 
            background: #010a15; 
            color: #00f3ff; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; padding: 15px;
            overflow: hidden; 
            display: grid;
            grid-template-columns: 1.2fr 2fr;
            gap: 15px;
            height: 100vh; width: 100vw;
            position: relative;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Efeito de Vidro de Monitor e Scanline */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 243, 255, 0.06) 50%);
            background-size: 100% 4px; z-index: 20; pointer-events: none;
        }
        body::after {
            content: ""; position: absolute; width: 100%; height: 6px; background: rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 15px #00f3ff; animation: scan 4s linear infinite; z-index: 21; pointer-events: none;
        }

        /* MODO HACKER CRIPTOGRAFADO */
        body.hacker-mode { background: #000500; color: #00ff00; }
        body.hacker-mode::before { background: linear-gradient(rgba(0, 10, 0, 0) 50%, rgba(0, 255, 0, 0.08) 50%); background-size: 100% 4px; }
        body.hacker-mode::after { background: rgba(0, 255, 0, 0.3); box-shadow: 0 0 15px #00ff00; }
        body.hacker-mode .ring { border-color: rgba(0, 255, 0, 0.6); box-shadow: 0 0 20px rgba(0, 255, 0, 0.3); }
        body.hacker-mode .ring-inner { border-color: #00ff00; border-style: dotted; }
        body.hacker-mode .center-glow { background: #00ff00; box-shadow: 0 0 30px #00ff00; }
        body.hacker-mode .hud-panel { border-color: rgba(0, 255, 0, 0.2); background: rgba(0, 5, 0, 0.6); }
        body.hacker-mode button { border-color: #00ff00; color: #00ff00; }
        body.hacker-mode button:active { background: rgba(0, 255, 0, 0.2); }
        body.hacker-mode .cmd-btn { background: rgba(0, 255, 0, 0.05); border-color: rgba(0,255,0,0.3); color: #22c55e; }
        body.hacker-mode .bar { background: #00ff00; }

        /* Painel Modular (Layout Base) */
        .hud-panel {
            background: rgba(2, 12, 27, 0.5);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 6px;
            padding: 12px;
            display: flex; flex-direction: column;
            backdrop-filter: blur(5px);
            z-index: 10;
            overflow: hidden;
        }

        /* PAINEL ESQUERDO: CORE INTERATIVO */
        .panel-left { justify-content: space-between; align-items: center; }
        
        /* Renderizador do Reator Arc Interativo 3D */
        .viewport-3d {
            perspective: 600px;
            width: 100%; height: 140px;
            display: flex; justify-content: center; align-items: center;
            margin-top: 5px;
        }
        .reactor-3d {
            width: 110px; height: 110px;
            transform: rotateX(35deg) rotateY(-10deg);
            transform-style: preserve-3d;
            position: relative;
        }
        .ring {
            position: absolute; width: 100%; height: 100%;
            border: 4px dashed rgba(0, 243, 255, 0.5); border-radius: 50%;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            animation: rotClockwise 8s linear infinite;
        }
        .ring-inner {
            position: absolute; top: 12%; left: 12%; width: 76%; height: 76%;
            border: 3px double #00f3ff; border-radius: 50%;
            animation: rotCounterClockwise 4s linear infinite;
        }
        .center-glow {
            position: absolute; top: 33%; left: 33%; width: 34%; height: 34%;
            background: #ffffff; border-radius: 50%;
            box-shadow: 0 0 30px #00f3ff, inset 0 0 10px #00f3ff;
            animation: pulseGlow 2s ease-in-out infinite;
        }

        /* Listagem de Comandos Otimizada */
        .cmd-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
            width: 100%; margin-top: 10px;
        }
        .cmd-btn {
            background: rgba(0, 243, 255, 0.03);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 4px; color: #38bdf8;
            font-family: inherit; font-size: 10px; padding: 8px 4px;
            cursor: pointer; text-align: left;
            text-transform: uppercase; white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis; transition: all 0.2s;
        }
        .cmd-btn:hover { color: #fff; border-color: #00f3ff; transform: scale(1.02); }

        /* PAINEL DIREITO: MAINFRAME */
        .panel-right { justify-content: space-between; }
        
        .header-status {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px dashed rgba(0, 243, 255, 0.2);
            padding-bottom: 6px; margin-bottom: 8px; font-size: 11px; color: #64748b;
        }
        
        /* Área Principal do Console */
        .console-box {
            flex-grow: 1; background: rgba(1, 6, 15, 0.8);
            border-left: 3px solid currentColor; padding: 10px;
            font-size: 12px; overflow-y: auto; margin-bottom: 10px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.6);
        }
        .sys-label { color: #475569; font-weight: bold; }

        /* Equalizador/Gráfico de Frequência Artificial */
        .data-visualizer { display: flex; gap: 3px; height: 25px; align-items: flex-end; margin-bottom: 8px; }
        .bar { flex-grow: 1; background: #00f3ff; height: 30%; animation: compute 1.2s ease-in-out infinite alternate; }
        /* Variações de tempo nas barras */
        .bar:nth-child(2n) { animation-duration: 0.6s; }
        .bar:nth-child(3n) { animation-duration: 0.9s; }

        /* Inputs Integrados */
        .action-bar { display: flex; gap: 8px; }
        input[type="text"] {
            flex-grow: 1; background: rgba(1, 6, 15, 0.9);
            border: 1px solid rgba(0, 243, 255, 0.2);
            color: inherit; font-family: inherit; font-size: 13px;
            padding: 10px; border-radius: 4px; outline: none;
        }
        input[type="text"]:focus { border-color: #00f3ff; }
        
        .ctrl-btn {
            background: rgba(0, 243, 255, 0.05); border: 1px solid currentColor;
            color: inherit; font-family: inherit; font-weight: bold;
            padding: 0 16px; border-radius: 4px; cursor: pointer; text-transform: uppercase;
        }

        /* Definições das Animações Core */
        @keyframes scan { from { top: -10px; } to { top: 100%; } }
        @keyframes rotClockwise { from { transform: rotateZ(0deg); } to { transform: rotateZ(360deg); } }
        @keyframes rotCounterClockwise { from { transform: rotateZ(360deg); } to { transform: rotateZ(0deg); } }
        @keyframes pulseGlow { 0%, 100% { transform: scale(0.9); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; filter: brightness(1.2); } }
        @keyframes compute { from { height: 10%; } to { height: 100%; } }
    </style>
</head>
<body>

    <div class="hud-panel panel-left">
        <div class="viewport-3d">
            <div class="reactor-3d">
                <div class="ring"></div>
                <div class="ring-inner"></div>
                <div class="center-glow"></div>
            </div>
        </div>
        
        <div style="text-align: center; width: 100%;">
            <h1 style="margin: 0; font-size: 20px; letter-spacing: 4px;" id="hudTitle">J.A.R.V.I.S.</h1>
            <span style="font-size: 9px; color: #475569; letter-spacing: 1px;">COGNITIVE HUD ENGINE v4.5</span>
        </div>

        <div class="cmd-grid">
            <div class="cmd-btn" onclick="acionarComando('jarvis')">➢ Iniciar</div>
            <div class="cmd-btn" onclick="acionarComando('abrir câmera')">➢ Câmera</div>
            <div class="cmd-btn" onclick="acionarComando('pesquisar homem de ferro')">➢ Pesquisar</div>
            <div class="cmd-btn" onclick="acionarComando('ligar modo hacker')">➢ M. Hacker</div>
            <div class="cmd-btn" onclick="acionarComando('desativar modo hacker')">➢ M. Stark</div>
            <div class="cmd-btn" onclick="acionarComando('que horas são?')">➢ Horas</div>
        </div>
    </div>

    <div class="hud-panel panel-right">
        <div class="header-status">
            <span>SYS_LOC: ONLINE</span>
            <span id="timeDisplay">00:00:00</span>
        </div>

        <div class="console-box">
            <div><span class="sys-label">[MONITOR]:</span> <span id="statusTxt">AGUARDANDO DIRETRIZ VETORIAL...</span></div>
            <div style="margin-top: 10px;"><span class="sys-label">[JARVIS]:</span> <span id="outputTxt">Pronto para a ação, senhor.</span></div>
        </div>

        <div class="data-visualizer">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>

        <div class="action-bar">
            <button class="ctrl-btn" onclick="escutarVoz()" id="micBtn">🎙️</button>
            <input type="text" id="inputCmd" placeholder="Aguardando diretriz..." onkeypress="verificarEnter(event)">
            <button class="ctrl-btn" onclick="processarEnvio()">Exec</button>
        </div>
    </div>

    <script>
        // Relógio Dinâmico em Tempo Real
        setInterval(() => {
            document.getElementById('timeDisplay').innerText = new Date().toLocaleTimeString('pt-BR');
        }, 1000);

        function verificarEnter(e) { if (e.key === 'Enter') processarEnvio(); }

        function processarEnvio() {
            const caixa = document.getElementById('inputCmd');
            const cmd = caixa.value.trim();
            if(!cmd) return;
            caixa.value = "";
            acionarComando(cmd);
        }

        function acionarComando(comandoBruto) {
            const t = comandoBruto.toLowerCase().trim();
            document.getElementById('statusTxt').innerText = "VETOR DE ENTRADA: \"" + comandoBruto.toUpperCase() + "\"";
            
            let r = "Diretriz local não indexada nos meus bancos de dados, senhor.";

            if (t.includes("câmera") || t.includes("camera")) {
                r = "Inicializando hardware óptico nativo do Android.";
                executarFeedback(r);
                setTimeout(() => { window.location.href = "intent://#Intent;action=android.media.action.IMAGE_CAPTURE;end"; }, 1200);
                return;
            }

            if (t.startsWith("pesquisar ")) {
                const termo = t.replace("pesquisar ", "");
                r = "Rastreando registros web para: " + termo;
                executarFeedback(r);
                setTimeout(() => { window.open("https://www.google.com/search?q=" + encodeURIComponent(termo), '_blank'); }, 1200);
                return;
            }

            if (t.includes("modo hacker") || t.includes("hacker")) {
                r = "Criptografia quântica ativa. Modificando espectro visual do painel central.";
                document.body.classList.add('hacker-mode');
                document.getElementById('hudTitle').innerText = "MAINFRAME";
            } else if (t.includes("stark") || t.includes("desativar modo hacker") || t.includes("normal")) {
                r = "Restaurando frequência azul neon padrão das Indústrias Stark.";
                document.body.classList.remove('hacker-mode');
                document.getElementById('hudTitle').innerText = "J.A.R.V.I.S.";
            } else if (t.includes("olá") || t.includes("jarvis") || t.includes("iniciar")) {
                r = "Todos os sistemas operando em perfeita simetria energética. À sua disposição.";
            } else if (t.includes("horas") || t.includes("tempo")) {
                r = "Cronômetro interno indica exatamente " + new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}) + ".";
            }

            executarFeedback(r);
        }

        function executarFeedback(resposta) {
            document.getElementById('outputTxt').innerText = resposta;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const fala = new SpeechSynthesisUtterance(resposta);
                fala.lang = 'pt-BR'; fala.rate = 1.15;
                window.speechSynthesis.speak(fala);
            }
        }

        function escutarVoz() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return;
            const rec = new SpeechRecognition();
            rec.lang = 'pt-BR';
            document.getElementById('statusTxt').innerText = "CAPTURANDO FREQUÊNCIA ACÚSTICA...";
            document.getElementById('micBtn').innerText = "🛑";
            rec.start();
            rec.onresult = (e) => { acionarComando(e.results[0][0].transcript); document.getElementById('micBtn').innerText = "🎙️"; };
            rec.onerror = () => { document.getElementById('micBtn').innerText = "🎙️"; };
        }
    </script>
</body>
</html>
