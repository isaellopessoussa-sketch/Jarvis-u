- name: Copiar arquivos para a pasta Android
      run: npx cap sync android

    - name: Configurar App para Modo Deitado (Paisagem)
      run: |
        sed -i 's/android:name=".MainActivity"/android:name=".MainActivity" android:screenOrientation="landscape"/' android/app/src/main/AndroidManifest.xml

    - name: Compilar o APK de verdade
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug
