name: Construir APK do Jarvis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar código do repositório
        uses: actions/checkout@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Instalar o Java (JDK 17)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar Dependências Core
        run: npm install

      - name: Injetar Estrutura de Assets Quânticos (www)
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Inicializar e Sincronizar Plataforma Android
        run: |
          npx cap android add || true
          npx cap sync android

      - name: Compilar o APK de Verdade
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Disponibilizar o APK para download
        uses: actions/upload-artifact@v3
        with:
          name: jarvis-core-v8-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
